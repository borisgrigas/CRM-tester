# docker-compose.yml — DESENVOLVIMENTO LOCAL apenas.
# Em produção (Railway, Render, Fly.io…) cada serviço é implantado
# diretamente pelo seu Dockerfile; este arquivo NÃO é executado no host.
# Copie .env.example → .env antes de subir localmente.

services:
  postgres:
    image: postgres:16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-crm_saas}
      POSTGRES_USER:     ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
    ports:
      # Exposto apenas para acesso local (psql, DBeaver, etc.).
      # Em produção remova ou restrinja a 127.0.0.1:5432:5432.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:   "postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-crm_saas}"
      APP_ENV:        "development"
      CORS_ORIGINS:   "${CORS_ORIGINS:-http://localhost:3000}"
      JWT_SECRET:     "${JWT_SECRET:-change-me-only-for-local-dev-never-in-production}"
      ADMIN_EMAIL:    "${ADMIN_EMAIL:-master@franqueadora.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-master123}"
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    # O seed trunca e repopula os dados de demonstração a cada start.
    # Em produção o Dockerfile usa apenas `uvicorn` — seed nunca roda.
    command: >
      sh -c "python seed.py && uvicorn server:app --host 0.0.0.0 --port 8001 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-http://localhost:8001}"
    container_name: crm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
