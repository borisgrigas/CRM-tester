version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_saas
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://crm_user:crm_pass@postgres:5432/crm_saas"
      ENV: "development"
      CORS_ORIGINS: "http://localhost:3000"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-64-chars}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-master@franqueadora.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-master123}"
    ports:
      - "8001:8001"
    command: >
      sh -c "python seed.py && uvicorn server:app --host 0.0.0.0 --port 8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: "http://localhost:8001"
    container_name: crm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
